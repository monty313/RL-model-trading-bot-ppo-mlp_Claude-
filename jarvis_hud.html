<!DOCTYPE html>
<!--
  QUANTRA · JARVIS HUD  —  self-contained real-time cockpit for the RL trading system.
  ─────────────────────────────────────────────────────────────────────────────────────
  WHAT THIS IS: a single-file (d3.js v7 from CDN, otherwise vanilla) holographic dashboard:
    • animated dependency graph of the quantra/ pipeline (pulsing data-flow dots),
    • live FTMO stats panel (Episode Reward, Win%, Daily PnL, Drawdown, FTMO status),
    • scrolling terminal log feed,
    • live clock + LIVE/SIM connection state.
  DATA SOURCE: tries a WebSocket at ws://localhost:8765 (see barbershop/ws_broadcaster.py, which
  streams quantra.diagnostics.telemetry_logger steps). If nothing is connected it falls back to a
  built-in SIMULATOR so the HUD is alive the moment you open the file. The event schema below is the
  CONTRACT shared with ws_broadcaster.py:
    {"t":"step","step":int,"module":"trainer","reward":float,"daily_pnl_pct":float,
     "drawdown_pct":float,"win_rate":float,"ftmo":"PASSING|BUILDING|AT RISK|BREACH",
     "action":"BUY EURUSD 0.02","msg":"..."}
  The pipeline node ids mirror the SOW milestones; the full, accurate import graph is generated by
  barbershop/repo_graph.py (python -m barbershop.repo_graph) and rendered in Barbershop Screen 6.
-->
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>QUANTRA · JARVIS HUD</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
  :root{
    --bg:#06070d; --panel:rgba(18,24,38,0.55); --panel-solid:#0d1320; --line:rgba(90,202,165,0.16);
    --ink:#e8f3f1; --muted:#7e8aa0; --cyan:#22d3ee; --green:#34d399; --violet:#a78bfa;
    --amber:#fbbf24; --red:#f87171; --grid:rgba(90,202,165,0.05);
    --glow-cyan:0 0 18px rgba(34,211,238,.55); --glow-green:0 0 18px rgba(52,211,153,.5);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);overflow:hidden;
    font-family:'SF Mono',ui-monospace,'Cascadia Code',Menlo,Consolas,monospace;
    background-image:
      radial-gradient(1200px 600px at 70% -10%, rgba(34,211,238,.10), transparent 60%),
      radial-gradient(900px 500px at 10% 110%, rgba(167,139,250,.10), transparent 60%),
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:auto,auto,34px 34px,34px 34px;}
  /* moving scanline */
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:50;
    background:linear-gradient(rgba(255,255,255,0) 50%, rgba(0,0,0,.18) 50%);background-size:100% 4px;
    mix-blend-mode:overlay;opacity:.35;animation:scan 8s linear infinite;}
  @keyframes scan{from{background-position:0 0}to{background-position:0 100%}}

  .hud{display:grid;grid-template-rows:54px 1fr 168px;grid-template-columns:1fr 320px;
    grid-template-areas:"head head" "graph stats" "log stats";height:100vh;gap:12px;padding:12px;}
  /* header */
  header{grid-area:head;display:flex;align-items:center;gap:16px;padding:0 18px;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;backdrop-filter:blur(9px);}
  .brand{font-weight:700;letter-spacing:3px;font-size:18px;
    background:linear-gradient(90deg,var(--cyan),var(--green));-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 22px rgba(34,211,238,.25);}
  .brand .dia{color:var(--cyan);-webkit-text-fill-color:var(--cyan);margin-right:8px;animation:spin 6s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .sub{color:var(--muted);font-size:11px;letter-spacing:2px}
  .spacer{flex:1}
  .pill{display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:1.5px;
    padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:rgba(0,0,0,.25)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 10px currentColor}
  .dot.live{background:var(--green)} .dot.sim{background:var(--amber)}
  #clock{font-variant-numeric:tabular-nums;color:var(--cyan);letter-spacing:2px;font-size:13px}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;backdrop-filter:blur(9px);
    position:relative;overflow:hidden}
  .panel .cap{position:absolute;top:9px;left:14px;font-size:10px;letter-spacing:3px;color:var(--muted);z-index:2}
  .panel .corner{position:absolute;width:14px;height:14px;border:2px solid var(--cyan);opacity:.5}
  .c-tl{top:6px;left:6px;border-right:0;border-bottom:0} .c-tr{top:6px;right:6px;border-left:0;border-bottom:0}
  .c-bl{bottom:6px;left:6px;border-right:0;border-top:0}  .c-br{bottom:6px;right:6px;border-left:0;border-top:0}

  #graph{grid-area:graph} #graph svg{width:100%;height:100%;display:block}
  .link{stroke:rgba(125,138,160,.30);stroke-width:1.4;fill:none}
  .flow{fill:var(--cyan);filter:drop-shadow(0 0 6px var(--cyan))}
  .node circle{stroke-width:2;cursor:pointer;transition:r .25s ease}
  .node text{fill:var(--ink);font-size:10px;pointer-events:none;text-anchor:middle}
  .node .tier{fill:var(--muted);font-size:7.5px;letter-spacing:1px}
  .btns{position:absolute;top:8px;right:12px;z-index:3;display:flex;gap:6px}
  .btns button{background:rgba(0,0,0,.35);color:var(--muted);border:1px solid var(--line);
    border-radius:7px;font:inherit;font-size:10px;padding:4px 9px;cursor:pointer}
  .btns button:hover{color:var(--cyan);border-color:var(--cyan)}

  #stats{grid-area:stats;display:flex;flex-direction:column;gap:11px;padding:14px}
  .stat{background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:11px;padding:11px 13px;position:relative}
  .stat .k{font-size:10px;letter-spacing:2px;color:var(--muted)}
  .stat .v{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:2px;
    transition:color .4s ease;text-shadow:0 0 14px rgba(34,211,238,.18)}
  .stat .u{font-size:12px;color:var(--muted);font-weight:400}
  .meter{height:6px;border-radius:6px;background:#0a0f1a;overflow:hidden;margin-top:8px;border:1px solid var(--line)}
  .meter i{display:block;height:100%;width:0;border-radius:6px;transition:width .5s ease,background .5s ease}
  .ftmo{display:flex;align-items:center;justify-content:space-between}
  .badge{font-size:13px;font-weight:700;letter-spacing:1.5px;padding:5px 12px;border-radius:8px;border:1px solid}

  #log{grid-area:log;padding:26px 8px 10px 8px}
  #logwrap{height:100%;overflow:hidden;display:flex;flex-direction:column-reverse;padding:0 10px;
    font-size:11.5px;line-height:1.55}
  .ln{white-space:pre;opacity:.92;animation:fade .4s ease}
  @keyframes fade{from{opacity:0;transform:translateX(-6px)}to{opacity:.92}}
  .ln .tag{color:var(--violet)} .ln.good .msg{color:var(--green)} .ln.warn .msg{color:var(--amber)}
  .ln.bad .msg{color:var(--red)} .ln .msg{color:#c7d2e0} .ln .ts{color:var(--muted)}
  .tip{position:fixed;pointer-events:none;z-index:99;background:var(--panel-solid);border:1px solid var(--cyan);
    border-radius:9px;padding:8px 11px;font-size:11px;max-width:260px;box-shadow:var(--glow-cyan);opacity:0;transition:opacity .15s}
</style>
</head>
<body>
<div class="hud">
  <header>
    <span class="brand"><span class="dia">◆</span>QUANTRA TRADING SYSTEM</span>
    <span class="sub">RL · PPO · FTMO AUTOPILOT</span>
    <span class="spacer"></span>
    <span class="pill"><span id="conn-dot" class="dot sim"></span><span id="conn-text">SIM</span></span>
    <span class="pill">◷ <span id="clock">--:--:--</span></span>
  </header>

  <section id="graph" class="panel">
    <span class="cap">SYSTEM DATAFLOW · LIVE</span>
    <i class="corner c-tl"></i><i class="corner c-tr"></i><i class="corner c-bl"></i><i class="corner c-br"></i>
    <div class="btns"><button id="btn-restart">↻ replay flow</button></div>
  </section>

  <aside id="stats" class="panel">
    <i class="corner c-tl"></i><i class="corner c-tr"></i><i class="corner c-bl"></i><i class="corner c-br"></i>
    <div class="stat"><div class="k">EPISODE REWARD</div><div class="v" id="s-reward">0.00</div></div>
    <div class="stat"><div class="k">WIN RATE</div><div class="v" id="s-win">0<span class="u">%</span></div>
      <div class="meter"><i id="m-win"></i></div></div>
    <div class="stat"><div class="k">DAILY PnL · target +2.5%</div><div class="v" id="s-pnl">0.00<span class="u">%</span></div>
      <div class="meter"><i id="m-pnl"></i></div></div>
    <div class="stat"><div class="k">DRAWDOWN · wall 4.0%</div><div class="v" id="s-dd">0.00<span class="u">%</span></div>
      <div class="meter"><i id="m-dd"></i></div></div>
    <div class="stat ftmo"><div><div class="k">FTMO STATUS</div><div class="k" style="color:var(--muted)">step <span id="s-step">0</span></div></div>
      <span class="badge" id="s-ftmo">BOOT</span></div>
  </aside>

  <section id="log" class="panel">
    <span class="cap">TELEMETRY STREAM</span>
    <i class="corner c-tl"></i><i class="corner c-tr"></i><i class="corner c-bl"></i><i class="corner c-br"></i>
    <div id="logwrap"></div>
  </section>
</div>
<div class="tip" id="tip"></div>

<script>
"use strict";
// ── The conceptual pipeline (SOW milestones). ids mirror ws_broadcaster module names. ───────────
const TIER = {
  data_loader:"M1 · DataLoader", feature_builder:"M2 · FeatureBuilder", law_mask_engine:"M3 · LawMask",
  trading_env:"M4 · TradingEnv", ppo_agent:"M5 · PPOAgent", rollout_buffer:"M5 · RolloutBuffer",
  reward_engine:"M6 · RewardEngine", curriculum_manager:"M7 · Curriculum", trainer:"M8 · Trainer",
  telemetry_logger:"M9 · Telemetry", mlp_interpreter:"M10 · Interpreter", llm_risk_doctor:"M11 · RiskDoctor",
  live_bridge:"M14 · LiveBridge"};
const ROLE = {
  data_loader:"MT5 1m bars → lookahead-safe frames", feature_builder:"203-scalar locked observation",
  law_mask_engine:"9 laws + 3 gates → legal-action mask", trading_env:"4-symbol, 5-slot, FTMO account",
  ppo_agent:"4-head policy · 3×256 trunk", rollout_buffer:"on-policy GAE store",
  reward_engine:"L0–L6 + QUAD · Layer-0 dominance", curriculum_manager:"trend→reversion→stationarity",
  trainer:"PPO update · γ0.997/λ0.97", telemetry_logger:"versioned per-step contract",
  mlp_interpreter:"7 diagnostic visuals", llm_risk_doctor:"read-only evidence diagnosis",
  live_bridge:"guarded MT5 execution"};
const COLOR = {data_loader:"#7f77dd",feature_builder:"#7f77dd",law_mask_engine:"#7f77dd",
  trading_env:"#38bdf8", ppo_agent:"#e0a52e",rollout_buffer:"#e0a52e",trainer:"#e0a52e",curriculum_manager:"#e0a52e",
  reward_engine:"#e0a52e", telemetry_logger:"#5dcaa5",mlp_interpreter:"#5dcaa5",llm_risk_doctor:"#5dcaa5",
  live_bridge:"#3b82f6"};
const LAYER = {data_loader:0,feature_builder:1,law_mask_engine:2,live_bridge:2,trading_env:3,reward_engine:3,
  curriculum_manager:3,ppo_agent:4,rollout_buffer:5,trainer:6,telemetry_logger:7,llm_risk_doctor:7,mlp_interpreter:8};
const NODES = Object.keys(TIER).map(id=>({id,tier:TIER[id],role:ROLE[id],color:COLOR[id],layer:LAYER[id],energy:0}));
const LINKS = [
  ["data_loader","feature_builder"],["feature_builder","law_mask_engine"],["law_mask_engine","trading_env"],
  ["trading_env","ppo_agent"],["ppo_agent","rollout_buffer"],["rollout_buffer","trainer"],
  ["reward_engine","trainer"],["trainer","telemetry_logger"],["telemetry_logger","mlp_interpreter"],
  ["trainer","llm_risk_doctor"],["live_bridge","trading_env"],["curriculum_manager","trainer"]
].map(([s,t])=>({source:s,target:t,phase:Math.random()}));

// ── d3 force-directed, layered left→right ───────────────────────────────────────────────────────
const gEl=document.getElementById("graph"), W=()=>gEl.clientWidth, H=()=>gEl.clientHeight;
const svg=d3.select("#graph").append("svg").attr("viewBox",`0 0 ${W()} ${H()}`).attr("preserveAspectRatio","xMidYMid meet");
const defs=svg.append("defs");
defs.append("filter").attr("id","glow").html('<feGaussianBlur stdDeviation="3.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>');
const linkSel=svg.append("g").selectAll("path").data(LINKS).join("path").attr("class","link");
const flowSel=svg.append("g").selectAll("circle").data(LINKS).join("circle").attr("class","flow").attr("r",3);
const nodeSel=svg.append("g").selectAll("g").data(NODES).join("g").attr("class","node");
nodeSel.append("circle").attr("r",16).attr("fill","#0c1322").attr("stroke",d=>d.color).attr("filter","url(#glow)");
nodeSel.append("text").attr("dy",30).text(d=>d.id.replace(/_/g," "));
nodeSel.append("text").attr("class","tier").attr("dy",41).text(d=>d.tier.split(" · ")[0]);

const lw=()=>W()-90, sim=d3.forceSimulation(NODES)
  .force("link",d3.forceLink(LINKS).id(d=>d.id).distance(74).strength(.5))
  .force("charge",d3.forceManyBody().strength(-360))
  .force("x",d3.forceX(d=>55+d.layer*(lw()/8)).strength(.9))
  .force("y",d3.forceY(()=>H()/2).strength(.08))
  .force("collide",d3.forceCollide(34)).on("tick",ticked);
function ticked(){
  linkSel.attr("d",d=>`M${d.source.x},${d.source.y} C ${(d.source.x+d.target.x)/2},${d.source.y} ${(d.source.x+d.target.x)/2},${d.target.y} ${d.target.x},${d.target.y}`);
  nodeSel.attr("transform",d=>`translate(${d.x},${d.y})`);
}
// hover tooltip
const tip=document.getElementById("tip");
nodeSel.on("mousemove",(e,d)=>{tip.style.opacity=1;tip.style.left=(e.clientX+14)+"px";tip.style.top=(e.clientY+12)+"px";
  tip.innerHTML=`<b style="color:${d.color}">${d.tier}</b><br><span style="color:#9fb0c4">${d.role}</span>`;})
  .on("mouseleave",()=>tip.style.opacity=0);
addEventListener("resize",()=>{svg.attr("viewBox",`0 0 ${W()} ${H()}`);sim.force("x",d3.forceX(d=>55+d.layer*(lw()/8)).strength(.9)).force("y",d3.forceY(()=>H()/2).strength(.08)).alpha(.5).restart();});

// ── flow-dot + node-energy animation loop ───────────────────────────────────────────────────────
function frame(){
  flowSel.each(function(d){ d.phase=(d.phase+0.006+d.energy*0.02)%1;
    const x=d.source.x+(d.target.x-d.source.x)*d.phase, y=d.source.y+(d.target.y-d.source.y)*d.phase;
    d3.select(this).attr("cx",x).attr("cy",y).attr("r",3+d.energy*3).attr("opacity",.5+d.energy*.5);
    d.energy*=0.96;
  });
  nodeSel.select("circle").attr("r",d=>16+d.energy*7)
    .attr("fill",d=>d.energy>.15?d3.color(d.color).copy({opacity:.18}):"#0c1322")
    .attr("stroke-width",d=>2+d.energy*2);
  NODES.forEach(n=>n.energy*=0.95);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
function pulse(modId){ const n=NODES.find(x=>x.id===modId); if(n)n.energy=1;
  LINKS.forEach(l=>{ if((l.source.id||l.source)===modId||(l.target.id||l.target)===modId) l.energy=1; }); }
document.getElementById("btn-restart").onclick=()=>{LINKS.forEach(l=>l.phase=Math.random());NODES.forEach(n=>n.energy=1);};

// ── live stats (animated numbers) ───────────────────────────────────────────────────────────────
const S={reward:0,win:52,pnl:0,dd:0,step:0,ftmo:"BOOT"};      // displayed (eased) values
const T={reward:0,win:52,pnl:0,dd:0,step:0,ftmo:"BUILDING"};  // targets
function ease(a,b){return a+(b-a)*0.12;}
const $=id=>document.getElementById(id);
function paintStats(){
  S.reward=ease(S.reward,T.reward); S.win=ease(S.win,T.win); S.pnl=ease(S.pnl,T.pnl); S.dd=ease(S.dd,T.dd);
  $("s-reward").textContent=(S.reward>=0?"+":"")+S.reward.toFixed(2);
  $("s-reward").style.color=S.reward>=0?"var(--green)":"var(--red)";
  $("s-win").innerHTML=S.win.toFixed(0)+'<span class="u">%</span>';
  $("m-win").style.width=Math.max(0,Math.min(100,S.win))+"%"; $("m-win").style.background="var(--cyan)";
  $("s-pnl").innerHTML=(S.pnl>=0?"+":"")+S.pnl.toFixed(2)+'<span class="u">%</span>';
  $("s-pnl").style.color=S.pnl>=0?"var(--green)":"var(--red)";
  $("m-pnl").style.width=Math.max(0,Math.min(100,(S.pnl/2.5)*100))+"%"; $("m-pnl").style.background=S.pnl>=2.5?"var(--green)":"var(--cyan)";
  $("s-dd").innerHTML="-"+Math.abs(S.dd).toFixed(2)+'<span class="u">%</span>';
  $("s-dd").style.color=S.dd>=3.5?"var(--red)":(S.dd>=3?"var(--amber)":"var(--ink)");
  const ddf=Math.min(100,(S.dd/4)*100); $("m-dd").style.width=ddf+"%";
  $("m-dd").style.background=S.dd>=3.5?"var(--red)":(S.dd>=3?"var(--amber)":"var(--green)");
  $("s-step").textContent=T.step.toLocaleString();
  const b=$("s-ftmo"), st=T.ftmo, c={PASSING:"--green",BUILDING:"--cyan","AT RISK":"--amber",BREACH:"--red",BOOT:"--muted"}[st]||"--cyan";
  b.textContent=st; b.style.color=`var(${c})`; b.style.borderColor=`var(${c})`; b.style.background="rgba(0,0,0,.25)";
  requestAnimationFrame(paintStats);
}
requestAnimationFrame(paintStats);

// ── terminal log ────────────────────────────────────────────────────────────────────────────────
const logwrap=document.getElementById("logwrap");
function logLine(tag,msg,level){
  const t=new Date().toTimeString().slice(0,8);
  const el=document.createElement("div"); el.className="ln "+(level||"");
  el.innerHTML=`<span class="ts">${t}</span> <span class="tag">[${tag}]</span> <span class="msg">${msg}</span>`;
  logwrap.prepend(el); while(logwrap.childNodes.length>120) logwrap.removeChild(logwrap.lastChild);
}

// ── apply an event (from WebSocket OR the simulator) ────────────────────────────────────────────
function applyEvent(e){
  if(typeof e.step==="number") T.step=e.step;
  if(typeof e.reward==="number") T.reward=e.reward;
  if(typeof e.win_rate==="number") T.win=e.win_rate;
  if(typeof e.daily_pnl_pct==="number") T.pnl=e.daily_pnl_pct;
  if(typeof e.drawdown_pct==="number") T.dd=Math.abs(e.drawdown_pct);
  if(e.ftmo) T.ftmo=e.ftmo;
  if(e.module) pulse(e.module);
  if(e.msg||e.action){
    const lvl=e.ftmo==="BREACH"?"bad":(T.dd>=3.5?"warn":(T.reward>0?"good":""));
    const tag=(e.module||"system").replace(/_/g," ");
    logLine(tag, e.msg||`step ${T.step} | r ${T.reward>=0?"+":""}${T.reward.toFixed(2)} | ${e.action||"HOLD"} | dd ${T.dd.toFixed(1)}%`, lvl);
  }
}

// ── SIMULATOR (used until a real WebSocket connects) ────────────────────────────────────────────
const MODS=Object.keys(TIER), SYMS=["EURUSD","GBPUSD","XAUUSD","US30"], SIDES=["BUY","SELL","HOLD","CLOSE"];
let simTimer=null, dayPnl=0, dd=0, step=4800, win=52;
function simStep(){
  step++; dayPnl=Math.max(-3,Math.min(4.2,dayPnl+(Math.random()-0.45)*0.18));
  dd=Math.max(0,Math.min(4.3,dd+(Math.random()-0.55)*0.22)); win=Math.max(38,Math.min(72,win+(Math.random()-0.5)*1.4));
  const reward=+( (Math.random()-0.42)*0.9 ).toFixed(2);
  const ftmo=dd>=4?"BREACH":(dayPnl>=2.5?"PASSING":(dd>=3?"AT RISK":"BUILDING"));
  const mod=MODS[Math.floor(Math.random()*MODS.length)];
  const sym=SYMS[Math.floor(Math.random()*SYMS.length)], side=SIDES[Math.floor(Math.random()*SIDES.length)];
  const lots=(Math.random()*0.08+0.01).toFixed(2);
  applyEvent({t:"step",step,module:mod,reward,daily_pnl_pct:dayPnl,drawdown_pct:dd,win_rate:win,ftmo,
    action:`${side} ${sym} ${lots}`});
}
function startSim(){ if(simTimer)return; setConn(false); logLine("system","SIM MODE — ws://localhost:8765 not connected. Run barbershop/ws_broadcaster.py for live data.","warn"); simTimer=setInterval(simStep,950); }
function stopSim(){ clearInterval(simTimer); simTimer=null; }

// ── WebSocket (real telemetry via barbershop/ws_broadcaster.py) ─────────────────────────────────
function setConn(live){ const d=$("conn-dot"),t=$("conn-text");
  d.className="dot "+(live?"live":"sim"); t.textContent=live?"LIVE":"SIM"; t.style.color=live?"var(--green)":"var(--amber)"; }
function connect(){
  let ws; try{ ws=new WebSocket("ws://localhost:8765"); }catch(_){ startSim(); return; }
  ws.onopen=()=>{ stopSim(); setConn(true); logLine("system","LIVE — telemetry stream connected.","good"); };
  ws.onmessage=ev=>{ try{ applyEvent(JSON.parse(ev.data)); }catch(_){ } };
  ws.onclose=()=>{ setConn(false); if(!simTimer) startSim(); setTimeout(connect,4000); };
  ws.onerror=()=>{ try{ws.close();}catch(_){}; };
}

// ── clock + boot ────────────────────────────────────────────────────────────────────────────────
setInterval(()=>{ $("clock").textContent=new Date().toTimeString().slice(0,8); },1000);
$("clock").textContent=new Date().toTimeString().slice(0,8);
logLine("system","QUANTRA JARVIS HUD online · awaiting telemetry…","good");
connect(); setTimeout(()=>{ if(!$("conn-text").textContent.includes("LIVE")) startSim(); }, 1200);
</script>
</body>
</html>
